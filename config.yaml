ollama:
  url: "http://localhost:11434"
  model: "llama3.2"
  use_llm: true

robot:
  host: "172.25.200.20"
  port: 5005

camera:
  index: 0
  width: 640
  height: 480
  fps: 30

gesture:
  left_model: "models/left_lstm.keras"
  right_model: "models/right_lstm.keras"
  left_labels: "models/left_label_map.npy"
  right_labels: "models/right_label_map.npy"
  confidence_threshold: 0.7
  speed_decay: 0.85
  max_num_hands: 2
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.4

voice:
  sample_rate: 16000
  blocksize: 800
  vad_threshold: 0.015
  silence_limit: 0.8
  min_voice_len: 0.3
  max_voice_len: 3.0

fusion:
  turn_scale: 0.35
  precise_turn_speed: 0.8
  max_speed_scale: 2.0
  min_speed_scale: 0.2
  speed_step: 0.1

metrics:
  log_path: "metrics/latency_log.csv"
